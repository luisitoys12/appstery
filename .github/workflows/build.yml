name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Cachear dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: appstery-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  release:
    name: Publicar Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar APK Release (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Renombrar APK con versión
        run: |
          VERSION=${{ github.ref_name }}
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/appstery-${VERSION}.apk || true
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/appstery-${VERSION}.apk 2>/dev/null || true

      - name: Subir APK al Release de GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/appstery-*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
