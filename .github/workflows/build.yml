name: Build & VirusTotal Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:

  build-debug:
    name: Compilar APK Debug
    runs-on: ubuntu-latest
    outputs:
      artifact-name: appstery-debug-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: appstery-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  virustotal-debug:
    name: VirusTotal Scan - APK Debug
    runs-on: ubuntu-latest
    needs: build-debug
    if: ${{ vars.VT_ENABLED != 'false' }}

    steps:
      - name: Descargar APK
        uses: actions/download-artifact@v4
        with:
          name: appstery-debug-${{ github.sha }}
          path: apk-output/

      - name: Escanear con VirusTotal
        uses: crazy-max/ghaction-virustotal@v4
        id: vt
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: apk-output/*.apk
          update_release_body: false
          request_rate: 4

      - name: Evaluar resultado
        run: |
          echo "Analisis VT: ${{ steps.vt.outputs.analysis }}"
          echo '${{ steps.vt.outputs.analysis }}' | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    for f, info in data.items():
        stats = info.get('data',{}).get('attributes',{}).get('last_analysis_stats',{})
        mal = stats.get('malicious', 0)
        sus = stats.get('suspicious', 0)
        undet = stats.get('undetected', 0)
        total = sum(stats.values())
        print(f'Archivo : {f}')
        print(f'Total   : {total} motores')
        print(f'Malicioso: {mal} | Sospechoso: {sus} | Limpio: {undet}')
        if mal >= 3:
            print('RESULTADO: RECHAZADO')
            sys.exit(1)
        elif mal > 0:
            print(f'RESULTADO: ADVERTENCIA - {mal} falso(s) positivo(s)')
        else:
            print('RESULTADO: APROBADO - Sin detecciones')
except Exception as e:
    print(f'No se pudo parsear: {e}')
"

  release:
    name: Publicar Release
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - name: Compilar APK Release
        run: ./gradlew assembleRelease --stacktrace

      - name: Renombrar APK
        run: |
          VERSION=${{ github.ref_name }}
          find app/build/outputs/apk/release/ -name '*.apk' | head -1 | \
            xargs -I{} cp {} app/build/outputs/apk/release/appstery-${VERSION}.apk

      - name: VirusTotal Scan - APK Release
        uses: crazy-max/ghaction-virustotal@v4
        id: vt-release
        if: ${{ secrets.VT_API_KEY != '' }}
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: app/build/outputs/apk/release/appstery-*.apk
          # Agrega el enlace de VT directamente al body del GitHub Release
          update_release_body: true
          request_rate: 4

      - name: Verificar que pasa VT antes de publicar
        if: ${{ secrets.VT_API_KEY != '' }}
        run: |
          echo '${{ steps.vt-release.outputs.analysis }}' | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    for f, info in data.items():
        stats = info.get('data',{}).get('attributes',{}).get('last_analysis_stats',{})
        mal = stats.get('malicious', 0)
        print(f'{f}: malicious={mal}')
        if mal >= 3:
            print('ERROR: APK rechazado por VirusTotal')
            sys.exit(1)
except:
    print('Analisis completado (sin parsear)')
"

      - name: Publicar APK en GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/appstery-*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
